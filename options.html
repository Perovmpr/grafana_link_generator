<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Настройки Grafana Link Generator</title>
    <style>
        body {
            width: 400px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 10px;
            background-color: #f5f8fa;
            color: #14171a;
        }
        h2 {
            font-size: 20px;
            font-weight: bold;
            color: #1da1f2;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #14171a;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #e1e8ed;
            border-radius: 4px;
            background-color: white;
        }
        button {
            padding: 10px 15px;
            margin-top: 20px;
            cursor: pointer;
            background-color: #1da1f2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        button:hover {
            background-color: #0d95e8;
        }
    </style>
</head>
<body>
<h2>Настройки Grafana Link Generator</h2>
<label for="headerName">Имя заголовка:</label>
<input type="text" id="headerName" placeholder="request-id">
<label for="datasource">Идентификатор источника данных в Grafana:</label>
<input type="text" id="datasource">
<label for="orgId">Организация:</label>
<input type="text" id="orgId" placeholder="1">
<label for="grafanaDomain">Домен Grafana:</label>
<input type="url" id="grafanaDomain" placeholder="Домен Grafana">
<label for="template">Шаблон:</label>
<input type="text" id="template" placeholder='{} |= ``'>
<button id="saveButton">Сохранить</button>
<script src="options.js"></script>
</body>
</html>
