<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Настройки Grafana Link Generator</title>
    <style>
        body {
            width: 400px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 10px;
            background-color: #f5f8fa;
            color: #14171a;
        }
        h2 {
            font-size: 20px;
            font-weight: bold;
            color: #1da1f2;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #14171a;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #e1e8ed;
            border-radius: 4px;
            background-color: white;
        }
        button {
            padding: 10px 15px;
            margin-top: 20px;
            cursor: pointer;
            background-color: #1da1f2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        button:hover {
            background-color: #0d95e8;
        }
    </style>
</head>
<body>
<h2>Настройки Grafana Link Generator</h2>

<h3>Общие настройки</h3>
<label for="mode">Режим работы:</label>
<select id="mode">
    <option value="loki">Loki (по request-id)</option>
    <option value="tempo">Tempo (OpenTelemetry traces)</option>
</select>

<label for="grafanaDomain">Домен Grafana:</label>
<input type="url" id="grafanaDomain" placeholder="https://grafana.example">

<label for="orgId">Организация:</label>
<input type="text" id="orgId" placeholder="1">

<div id="lokiSettings">
    <h3>Настройки Loki</h3>
    <label for="headerName">Заголовок request ID:</label>
    <input type="text" id="headerName" placeholder="request-id">
    
    <label for="datasource">UID источника данных Loki:</label>
    <input type="text" id="datasource">
    
    <label for="template">Шаблон запроса Loki:</label>
    <input type="text" id="template" placeholder='{requestId="%s"} |= ``'>
</div>

<div id="tempoSettings" style="display: none;">
    <h3>Настройки Tempo (OpenTelemetry)</h3>
    <label for="tempoDatasource">UID источника данных Tempo:</label>
    <input type="text" id="tempoDatasource">
    
    <label for="traceIdHeader">Заголовок Trace ID:</label>
    <input type="text" id="traceIdHeader" placeholder="traceparent">
    <small>Стандарт W3C Trace Context: traceparent</small>
    
    <label for="spanIdHeader">Заголовок Span ID (опционально):</label>
    <input type="text" id="spanIdHeader" placeholder="x-span-id">
</div>

<button id="saveButton">Сохранить</button>
<script src="options.js"></script>
</body>
</html>
