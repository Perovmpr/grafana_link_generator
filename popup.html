<!DOCTYPE html>
<meta charset="UTF-8">
<html>
<head>
    <title>Grafana Link Generator</title>
    <style>
        body {
            width: 600px;
            font-family: Arial, sans-serif;
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            word-wrap: break-word; /* Добавляем перенос слов */
        }
        th {
            background-color: #f2f2f2;
        }
        a {
            color: blue;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        td:first-child { /* Ограничиваем ширину первого столбца (URL) */
            max-width: 150px;
        }
        button {
            padding: 5px 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        .copy-button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .copy-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<h2>Запросы и ссылки на Grafana</h2>
<a href="#" id="settingsLink">Настройки</a>
<button id="clearButton">Очистить историю</button>
<table id="requestsTable">
    <thead>
    <tr>
        <th>URL</th>
        <th>Request ID</th>
        <th>Grafana Link</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    </tbody>
</table>
<script src="popup.js"></script>
</body>
</html>
